<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fruit Cutting Game FINAL</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<style>
body{
    margin:0;
    overflow:hidden;
    background: radial-gradient(circle at top, #111, #000);
    font-family: Arial;
    color:white;
}

canvas{display:block;}

#ui{
    position:absolute;
    top:10px;
    left:10px;
    font-size:22px;
    z-index:10;
}

#gameOver{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:60px;
    font-weight:bold;
    display:none;
    text-align:center;
}

button{
    margin-top:20px;
    padding:10px 25px;
    font-size:18px;
    border:none;
    background:red;
    color:white;
    cursor:pointer;
    border-radius:10px;
}

#boxes{
    position:absolute;
    bottom:0;
    width:100%;
    display:flex;
    justify-content:space-around;
    padding:10px;
}

.box{
    width:80px;
    height:100px;
    border:2px solid white;
    border-radius:12px;
    background:rgba(255,255,255,0.05);
    text-align:center;
    position:relative;
}

.label{
    position:absolute;
    top:-22px;
    width:100%;
    color:#00ffcc;
    font-weight:bold;
}
</style>
</head>

<body>

<div id="ui">Score: <span id="score">0</span></div>

<div id="gameOver">
GAME OVER
<br>
<button onclick="restartGame()">Restart</button>
</div>

<div id="boxes"></div>
<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

/* 🔥 SMOOTHING FIX */
ctx.imageSmoothingEnabled = true;
ctx.imageSmoothingQuality = "high";
ctx.webkitImageSmoothingEnabled = true;
ctx.mozImageSmoothingEnabled = true;

/* 🔥 ANDROID FULLSCREEN FIX */
function resizeCanvas(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

let fruits = [];
let slices = [];
let particles = [];
let score = 0;
let running = true;
let animationId;

/* 🍉 FRUITS */
const fruitTypes = [
{
    key:"apple",
    img:"https://i.postimg.cc/nLv9sKHn/pngtree-fresh-apple-fruit-red-png-image-10203073.png"
},
{
    key:"banana",
    img:"https://i.postimg.cc/htQdnW6J/images-11-removebg-preview.png"
},
{
    key:"orange",
    img:"https://i.postimg.cc/G2vPVhmj/orange-1218158-1280.png"
},
{
    key:"apricot",
    img:"https://i.postimg.cc/WzsGpWrZ/pngimg-com-apricot-PNG12652.png"
},
{
    key:"pineapple",
    img:"https://i.postimg.cc/XYqgyzPk/pngtree-pineapple-png-with-ai-generated-png-image-11568478.png"
}
];

const boxesDiv = document.getElementById("boxes");
const jarPositions = {};

fruitTypes.forEach((f,index)=>{
    const b=document.createElement("div");
    b.className="box";

    const label=document.createElement("div");
    label.className="label";
    label.innerText="صوفی";

    b.appendChild(label);

    const img=document.createElement("img");
    img.src=f.img;
    img.style.width="60px";
    img.style.marginTop="30px";
    b.appendChild(img);

    boxesDiv.appendChild(b);

    setTimeout(()=>{
        const rect = b.getBoundingClientRect();
        jarPositions[f.key] = {
            x: rect.left + rect.width/2,
            y: rect.top
        };
    },200);
});

/* 🍉 FRUIT */
class Fruit{
    constructor(){
        this.data = fruitTypes[Math.floor(Math.random()*fruitTypes.length)];
        this.key = this.data.key;
        this.img = new Image();
        this.img.src = this.data.img;

        this.x = Math.random()*canvas.width;
        this.y = -50;
        this.radius = 60;
        this.speedY = 0;
        this.gravity = 0.25;
        this.sliced = false;
    }

    update(){
        this.speedY += this.gravity;
        this.y += this.speedY;
    }

    draw(){
        if(!this.img.complete){
            ctx.fillStyle="orange";
            ctx.beginPath();
            ctx.arc(this.x,this.y,40,0,Math.PI*2);
            ctx.fill();
            return;
        }

        let size = 120;
        let ratio = this.img.width / this.img.height;

        let drawW, drawH;

        if(ratio > 1){
            drawW = size;
            drawH = size / ratio;
        }else{
            drawH = size;
            drawW = size * ratio;
        }

        ctx.drawImage(
            this.img,
            this.x - drawW/2,
            this.y - drawH/2,
            drawW,
            drawH
        );
    }
}

/* 🍉 SLICE */
class SlicePart{
    constructor(x,y,img,key,side,targetX,targetY){
        this.x=x;
        this.y=y;
        this.img=img;
        this.key=key;
        this.side=side;

        this.vx=side*4;
        this.vy=-4;

        this.targetX=targetX;
        this.targetY=targetY;

        this.gravity=0.15;
        this.rot=0;
        this.alpha=1;
        this.toJar=false;
    }

    update(){
        if(!this.toJar){
            this.x+=this.vx;
            this.y+=this.vy;
            this.vy+=this.gravity;

            if(this.vy>2){
                this.toJar=true;
            }
        }else{
            this.x += (this.targetX-this.x) * 0.08;
            this.y += (this.targetY-this.y) * 0.08;
        }

        this.rot+=0.2;
        this.alpha-=0.01;
    }

    draw(){
        ctx.save();
        ctx.globalAlpha=this.alpha;
        ctx.translate(this.x,this.y);
        ctx.rotate(this.rot);

        ctx.beginPath();
        if(this.side===-1){
            ctx.rect(-50,-50,50,100);
        }else{
            ctx.rect(0,-50,50,100);
        }
        ctx.clip();

        let size = 80;
        let ratio = this.img.width / this.img.height;

        let drawW, drawH;

        if(ratio > 1){
            drawW = size;
            drawH = size / ratio;
        }else{
            drawH = size;
            drawW = size * ratio;
        }

        ctx.drawImage(this.img,-drawW/2,-drawH/2,drawW,drawH);

        ctx.restore();
    }
}

/* particles */
class Particle{
    constructor(x,y){
        this.x=x;
        this.y=y;
        this.vx=(Math.random()-0.5)*7;
        this.vy=(Math.random()-0.5)*7;
        this.life=35;
    }

    update(){
        this.x+=this.vx;
        this.y+=this.vy;
        this.life--;
    }

    draw(){
        ctx.fillStyle="orange";
        ctx.fillRect(this.x,this.y,4,4);
    }
}

setInterval(()=>{
    if(running) fruits.push(new Fruit());
},1200);

let drawing=false;

canvas.addEventListener("mousedown",()=>drawing=true);
canvas.addEventListener("mouseup",()=>drawing=false);
canvas.addEventListener("mousemove",cut);

canvas.addEventListener("touchstart",()=>drawing=true);
canvas.addEventListener("touchend",()=>drawing=false);
canvas.addEventListener("touchmove",cut);

function getPos(e){
    if(e.touches){
        return {x:e.touches[0].clientX,y:e.touches[0].clientY};
    }
    return {x:e.clientX,y:e.clientY};
}

function cut(e){
    if(!drawing) return;
    const p=getPos(e);

    fruits.forEach((f)=>{
        const dx=f.x-p.x;
        const dy=f.y-p.y;
        const d=Math.sqrt(dx*dx+dy*dy);

        if(d < f.radius && !f.sliced){
            sliceFruit(f);
        }
    });
}

function sliceFruit(fruit){
    fruit.sliced=true;
    score++;
    document.getElementById("score").innerText=score;

    const jar = jarPositions[fruit.key];

    slices.push(new SlicePart(fruit.x,fruit.y,fruit.img,fruit.key,-1,jar.x,jar.y));
    slices.push(new SlicePart(fruit.x,fruit.y,fruit.img,fruit.key,1,jar.x,jar.y));

    for(let i=0;i<15;i++){
        particles.push(new Particle(fruit.x,fruit.y));
    }
}

function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    fruits.forEach((f,i)=>{
        f.update();
        f.draw();

        if(f.y > canvas.height && !f.sliced){
            gameOver();
        }

        if(f.sliced) fruits.splice(i,1);
    });

    slices.forEach((s,i)=>{
        s.update();
        s.draw();
        if(s.alpha<=0) slices.splice(i,1);
    });

    particles.forEach((p,i)=>{
        p.update();
        p.draw();
        if(p.life<=0) particles.splice(i,1);
    });

    if(running){
        animationId = requestAnimationFrame(animate);
    }
}

animate();

function gameOver(){
    running=false;
    cancelAnimationFrame(animationId);
    document.getElementById("gameOver").style.display="block";
}

function restartGame(){
    cancelAnimationFrame(animationId);

    fruits=[];
    slices=[];
    particles=[];
    score=0;
    running=true;

    document.getElementById("score").innerText=0;
    document.getElementById("gameOver").style.display="none";

    animate();
}
</script>

</body>
</html>
