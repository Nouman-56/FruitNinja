<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fruit Cutting Game - Jar Counter (Big Fruits)</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, fixed-fit=cover">
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
}

body{
    margin:0;
    padding:0;
    overflow:hidden;
    background: #000000;
    font-family: 'Segoe UI', 'Arial', sans-serif;
    color:white;
    touch-action: none;
    position: fixed;
    width: 100%;
    height: 100%;
}

canvas{
    display:block;
    position:fixed;
    top:0;
    left:0;
    z-index:1;
    width: 100%;
    height: 100%;
    background: #000000;
}

#ui{
    position:fixed;
    top:15px;
    left:20px;
    font-size:26px;
    font-weight:bold;
    background:rgba(0,0,0,0.7);
    padding:8px 20px;
    border-radius:40px;
    backdrop-filter:blur(5px);
    z-index:20;
    letter-spacing:1px;
    box-shadow:0 0 10px rgba(0,255,200,0.3);
    font-family:monospace;
    color: white;
}

#gameOver{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:rgba(0,0,0,0.95);
    backdrop-filter:blur(12px);
    padding:30px 35px;
    border-radius:60px;
    text-align:center;
    z-index:100;
    display:none;
    border:2px solid gold;
    box-shadow:0 0 50px rgba(255,215,0,0.5);
    min-width:280px;
    max-width: 90vw;
}

#gameOver h1{
    font-size:48px;
    margin:0 0 15px 0;
    color:#ffcc44;
    text-shadow:2px 2px 0 #aa5500;
}

#summaryTable{
    margin:20px auto;
    background:#1e1a2f;
    border-radius:28px;
    padding:15px 20px;
    text-align:left;
    font-size:18px;
    font-weight:bold;
    border-spacing: 12px;
    width:100%;
}

#summaryTable td{
    padding:6px 12px;
    border-bottom:1px solid #ffcc66;
    font-size:20px;
}

#summaryTable tr:last-child td{
    border-bottom:none;
}

.jarName{
    color:#ffcc88;
    font-weight:bold;
}
.jarCount{
    color:#ffaa44;
    font-weight:bold;
    font-size:24px;
    text-align:right;
}

button{
    margin-top:20px;
    padding:12px 30px;
    font-size:20px;
    font-weight:bold;
    border:none;
    background:linear-gradient(45deg,#ff416c,#ff4b2b);
    color:white;
    cursor:pointer;
    border-radius:50px;
    transition:0.2s;
    box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

button:active{
    transform:scale(0.96);
}

/* JARS CONTAINER (MODERN GLASS) */
#boxes{
    position:fixed;
    bottom:12px;
    width:100%;
    display:flex;
    justify-content:space-evenly;
    align-items:flex-end;
    gap:8px;
    padding:0 6px;
    z-index:15;
    pointer-events:none;
    box-sizing:border-box;
    left: 0;
}

.box{
    width:70px;
    height:96px;
    background:linear-gradient(145deg,#2c2418,#1a150e);
    border:2px solid #ffcc66;
    border-radius:18px 18px 35px 35px;
    text-align:center;
    position:relative;
    box-shadow:0 10px 12px rgba(0,0,0,0.4);
    transition: all 0.1s ease;
    backdrop-filter: blur(2px);
    overflow: visible;
}

/* jar shine */
.box::before{
    content:"";
    position:absolute;
    top:-7px;
    left:20%;
    width:60%;
    height:10px;
    background:#eebb55;
    border-radius:20px;
    opacity:0.7;
}

.label{
    position:absolute;
    top:-26px;
    left:50%;
    transform:translateX(-50%);
    background:linear-gradient(135deg,#f5d742,#e6b800);
    color:#2c1a00;
    font-weight:bold;
    font-size:14px;
    padding:4px 10px;
    border-radius:40px;
    font-family: "Arial Black", Arial, sans-serif;
    white-space:nowrap;
    box-shadow:0 2px 8px gold;
    letter-spacing:1px;
}

/* counter badge on jar */
.jarCounterBadge{
    position:absolute;
    bottom:-12px;
    right:-10px;
    background:#ff4444;
    color:white;
    font-weight:bold;
    font-size:16px;
    min-width:28px;
    height:28px;
    border-radius:40px;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:0 8px;
    border:2px solid gold;
    font-family:monospace;
    font-weight:bold;
    background:#dd3311;
    box-shadow:0 2px 6px black;
    z-index:25;
    pointer-events:none;
}

.box img{
    width:52px;
    margin-top:22px;
    filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.5));
}

/* Jar drop animation effect */
@keyframes jarShake {
    0% { transform: scale(1); background: linear-gradient(145deg,#2c2418,#1a150e); }
    30% { transform: scale(1.08); background: linear-gradient(145deg,#ffcc66,#d4a017); border-color: #fff5b0; }
    60% { transform: scale(1.02); background: linear-gradient(145deg,#f5d742,#e6b800); }
    100% { transform: scale(1); background: linear-gradient(145deg,#2c2418,#1a150e); border-color: #ffcc66; }
}

.jar-drop-animation {
    animation: jarShake 0.45s ease-out;
}

/* fruit fall into jar effect particles */
@keyframes splashParticle {
    0% { opacity: 0.9; transform: scale(0.2); }
    100% { opacity: 0; transform: scale(1.5); }
}

/* Very Good Popup Animation */
@keyframes popupFade {
    0% { opacity: 0; transform: scale(0.5); }
    20% { opacity: 1; transform: scale(1.2); }
    40% { opacity: 1; transform: scale(1); }
    80% { opacity: 1; transform: scale(1); }
    100% { opacity: 0; transform: scale(0.8); visibility: hidden; }
}

.very-good-popup {
    position: fixed;
    top: 40%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: linear-gradient(135deg, #ffd89b, #c7e9fb);
    color: #d41b1b;
    font-size: 52px;
    font-weight: bold;
    padding: 20px 50px;
    border-radius: 80px;
    z-index: 200;
    white-space: nowrap;
    font-family: 'Arial Black', sans-serif;
    text-shadow: 3px 3px 0px rgba(0,0,0,0.2);
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    border: 3px solid gold;
    letter-spacing: 2px;
    pointer-events: none;
    animation: popupFade 1.2s ease-out forwards;
}
</style>
</head>

<body>

<div id="ui">🍉 SCORE: <span id="score">0</span></div>

<div id="gameOver">
    <h1>🍍 GAME OVER 🍎</h1>
    <div style="font-size:20px; margin-bottom:8px;">✨ Fruits Collected in Jars ✨</div>
    <table id="summaryTable">
        <!-- dynamic rows filled by JS -->
    </table>
    <button onclick="restartGame()">🔪 RESTART GAME 🔪</button>
</div>

<div id="boxes"></div>
<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

// high quality rendering
ctx.imageSmoothingEnabled = true;
ctx.imageSmoothingQuality = "high";

/* 🔒 FIXED ANDROID SCREEN SIZE - NO SCROLLING, NO FRUIT OUTSIDE */
let screenWidth = window.innerWidth;
let screenHeight = window.innerHeight;

function resizeCanvas(){
    screenWidth = window.innerWidth;
    screenHeight = window.innerHeight;
    canvas.width = screenWidth;
    canvas.height = screenHeight;
    canvas.style.width = screenWidth + "px";
    canvas.style.height = screenHeight + "px";
}
resizeCanvas();

// Prevent any scroll or zoom behavior
window.addEventListener("resize", ()=>{
    resizeCanvas();
    updateJarPositions();
    window.scrollTo(0, 0);
    document.body.scrollTop = 0;
    document.documentElement.scrollTop = 0;
});

// Lock screen to prevent any movement
window.addEventListener("touchmove", function(e) {
    if(e.target === canvas || canvas.contains(e.target)) {
        e.preventDefault();
    }
}, { passive: false });

document.body.addEventListener("touchmove", function(e) {
    e.preventDefault();
}, { passive: false });

let fruits = [];
let slices = [];
let particles = [];
let specialItems = [];
let score = 0;
let running = true;
let animationId;

// Special image counter - every 20 fruits
let fruitCutCounter = 0;
const SPECIAL_IMAGE_URL = "https://i.postimg.cc/FR29jzNn/1776996987711-1-removebg-preview.png";
let specialImg = new Image();
specialImg.src = SPECIAL_IMAGE_URL;

/* ========== 🥫 JAR TRACKER SYSTEM ========== */
let jarFruitCount = {
    apple: 0,
    banana: 0,
    orange: 0,
    apricot: 0,
    pineapple: 0
};

// fruit types
const fruitTypes = [
    { key:"apple",    name:"🍎 Apple",   img:"https://i.postimg.cc/nLv9sKHn/pngtree-fresh-apple-fruit-red-png-image-10203073.png" },
    { key:"banana",   name:"🍌 Banana",  img:"https://i.postimg.cc/htQdnW6J/images-11-removebg-preview.png" },
    { key:"orange",   name:"🍊 Orange",  img:"https://i.postimg.cc/G2wPVhmj/orange-1218158-1280.png" },
    { key:"apricot",  name:"🍑 Apricot", img:"https://i.postimg.cc/WzsGpWrZ/pngimg-com-apricot-PNG12652.png" },
    { key:"pineapple",name:"🍍 Pineapple",img:"https://i.postimg.cc/XYqgyzPk/pngtree-pineapple-png-with-ai-generated-png-image-11568478.png" }
];

const boxesDiv = document.getElementById("boxes");
let jarPositions = {};
let jarElements = {};

// create jars dynamically
function buildJars(){
    boxesDiv.innerHTML = "";
    jarElements = {};
    fruitTypes.forEach((fruit, idx) => {
        const box = document.createElement("div");
        box.className = "box";
        box.setAttribute("data-jar", fruit.key);
        jarElements[fruit.key] = box;
        
        const label = document.createElement("div");
        label.className = "label";
        label.innerText = "صوفی";
        box.appendChild(label);
        
        const fruitImg = document.createElement("img");
        fruitImg.src = fruit.img;
        fruitImg.alt = fruit.key;
        box.appendChild(fruitImg);
        
        const badge = document.createElement("div");
        badge.className = "jarCounterBadge";
        badge.id = `badge_${fruit.key}`;
        badge.innerText = "0";
        box.appendChild(badge);
        
        boxesDiv.appendChild(box);
    });
    setTimeout(() => {
        updateJarPositions();
    }, 40);
}

function updateJarPositions(){
    const boxes = document.querySelectorAll(".box");
    boxes.forEach((box, index) => {
        const rect = box.getBoundingClientRect();
        const fruitKey = fruitTypes[index].key;
        jarPositions[fruitKey] = {
            x: rect.left + rect.width/2,
            y: rect.top + rect.height/2 - 10,
            rect: rect
        };
    });
}

function updateJarBadge(fruitKey){
    const badge = document.getElementById(`badge_${fruitKey}`);
    if(badge){
        badge.innerText = jarFruitCount[fruitKey];
        badge.style.transform = "scale(1.2)";
        setTimeout(()=>{ if(badge) badge.style.transform = "scale(1)"; }, 150);
    }
}

// Animate jar when fruit falls into it
function animateJarDrop(fruitKey) {
    const jarElement = jarElements[fruitKey];
    if(jarElement) {
        jarElement.classList.remove('jar-drop-animation');
        // Force reflow to restart animation
        void jarElement.offsetWidth;
        jarElement.classList.add('jar-drop-animation');
        setTimeout(() => {
            if(jarElement) jarElement.classList.remove('jar-drop-animation');
        }, 500);
        
        // Create mini splash particles around jar
        const jarRect = jarPositions[fruitKey];
        if(jarRect) {
            for(let i=0; i<12; i++) {
                particles.push(new JarSplashParticle(
                    jarRect.x + (Math.random() - 0.5) * 40,
                    jarRect.y + (Math.random() - 0.5) * 30
                ));
            }
        }
    }
}

function incrementJarCounter(fruitKey){
    if(jarFruitCount.hasOwnProperty(fruitKey)){
        jarFruitCount[fruitKey]++;
        updateJarBadge(fruitKey);
        // Trigger jar drop animation
        animateJarDrop(fruitKey);
    }
}

// Function to show "Very Good" popup
function showVeryGoodPopup() {
    const popup = document.createElement("div");
    popup.className = "very-good-popup";
    popup.innerText = "⭐ VERY GOOD! ⭐";
    document.body.appendChild(popup);
    setTimeout(() => {
        if(popup && popup.remove) popup.remove();
    }, 1200);
}

// Spawn special image after every 20 fruits cut
function trySpawnSpecialItem() {
    if(fruitCutCounter >= 20) {
        fruitCutCounter = 0;
        const special = new SpecialItem();
        specialItems.push(special);
    }
}

/* 🎁 SPECIAL ITEM CLASS */
class SpecialItem {
    constructor() {
        this.img = specialImg;
        this.x = 60 + Math.random() * (screenWidth - 120);
        this.y = -80 - Math.random() * 50;
        this.radius = 65;
        this.speedY = 1.8 + Math.random() * 2;
        this.gravity = 0.25;
        this.sliced = false;
        this.rotation = 0;
    }
    
    update() {
        this.speedY += this.gravity;
        this.y += this.speedY;
        this.rotation += 0.03;
    }
    
    draw() {
        if(!this.img.complete) {
            ctx.fillStyle = "#ff66cc";
            ctx.beginPath();
            ctx.arc(this.x, this.y, 50, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = "white";
            ctx.font = "bold 20px sans-serif";
            ctx.fillText("🎁", this.x-12, this.y+8);
            return;
        }
        
        let size = 130;
        let ratio = this.img.width / this.img.height;
        let drawW, drawH;
        if(ratio > 1){
            drawW = size;
            drawH = size / ratio;
        } else {
            drawH = size;
            drawW = size * ratio;
        }
        
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.rotation);
        ctx.drawImage(this.img, -drawW/2, -drawH/2, drawW, drawH);
        ctx.restore();
    }
}

/* 🍉 FRUIT CLASS */
class Fruit{
    constructor(){
        this.data = fruitTypes[Math.floor(Math.random()*fruitTypes.length)];
        this.key = this.data.key;
        this.img = new Image();
        this.img.src = this.data.img;
        const safeMargin = 60;
        this.x = safeMargin + Math.random() * (screenWidth - safeMargin * 2);
        this.y = -80 - Math.random() * 50;
        this.radius = 78;
        this.speedY = 1.8 + Math.random() * 2.5;
        this.gravity = 0.25;
        this.sliced = false;
        this.rotation = 0;
    }

    update(){
        this.speedY += this.gravity;
        this.y += this.speedY;
        this.rotation += 0.03;
    }

    draw(){
        if(!this.img.complete){
            ctx.fillStyle="#ffaa55";
            ctx.beginPath();
            ctx.arc(this.x,this.y,55,0,Math.PI*2);
            ctx.fill();
            ctx.fillStyle="black";
            ctx.font="bold 24px sans-serif";
            ctx.fillText("?",this.x-12,this.y+10);
            return;
        }

        let size = 160;
        let ratio = this.img.width / this.img.height;
        let drawW, drawH;
        if(ratio > 1){
            drawW = size;
            drawH = size / ratio;
        }else{
            drawH = size;
            drawW = size * ratio;
        }
        
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.rotation);
        ctx.drawImage(this.img, -drawW/2, -drawH/2, drawW, drawH);
        ctx.restore();
    }
}

/* 🍉 SLICE PART - Enhanced jar falling animation */
class SlicePart{
    constructor(x, y, img, fruitKey, side, targetX, targetY){
        this.x = x;
        this.y = y;
        this.img = img;
        this.fruitKey = fruitKey;
        this.side = side;
        this.vx = side * (4.2 + Math.random() * 1.5);
        this.vy = -5.2 - Math.random() * 2;
        this.targetX = targetX;
        this.targetY = targetY;
        this.gravity = 0.22;
        this.rot = 0;
        this.alpha = 1;
        this.toJar = false;
        this.teleportTriggered = false;
        this.fallIntensity = 0;
    }

    update(){
        if(!this.toJar){
            this.x += this.vx;
            this.y += this.vy;
            this.vy += this.gravity;
            this.rot += 0.15;
            this.fallIntensity = Math.min(1, this.fallIntensity + 0.02);
            // Start moving toward jar after reaching lower screen area
            if(this.vy > 1.2 || this.y > screenHeight - 130){
                this.toJar = true;
            }
        } else {
            // Smooth magnetic effect toward jar - creates falling into jar illusion
            let dx = this.targetX - this.x;
            let dy = this.targetY - this.y;
            let distance = Math.hypot(dx, dy);
            
            // Increase speed as it gets closer - feels like dropping into jar
            let speed = Math.min(0.32, 0.12 + (1 / (distance + 20)) * 3);
            
            this.x += dx * speed;
            this.y += dy * speed;
            this.rot += 0.2;
            
            // When very close to jar - teleport and trigger counter
            if(distance < 20 && !this.teleportTriggered){
                incrementJarCounter(this.fruitKey);
                this.teleportTriggered = true;
                this.alpha = 0;
                return;
            }
            
            // Scale down slightly when approaching jar for depth effect
            if(distance < 50) {
                this.scale = 0.8;
            } else {
                this.scale = 1;
            }
            
            if(distance < 12 && !this.teleportTriggered){
                incrementJarCounter(this.fruitKey);
                this.teleportTriggered = true;
                this.alpha = 0;
            }
        }

        if(this.alpha <= 0) return;
        if(this.y > screenHeight + 150 || this.x < -150 || this.x > screenWidth + 150){
            this.alpha = 0;
        }
    }

    draw(){
        if(this.alpha <= 0) return;
        if(!this.img.complete) return;
        
        ctx.save();
        ctx.globalAlpha = Math.min(this.alpha, 0.95);
        ctx.translate(this.x, this.y);
        ctx.rotate(this.rot);
        
        let scaleVal = this.scale || 1;
        ctx.scale(scaleVal, scaleVal);
        
        let w = 130;
        ctx.beginPath();
        if(this.side === -1){
            ctx.rect(-w/2, -w/2, w/2, w);
        } else {
            ctx.rect(0, -w/2, w/2, w);
        }
        ctx.clip();
        
        let size = 140;
        let ratio = this.img.width / this.img.height;
        let drawW, drawH;
        if(ratio > 1){
            drawW = size;
            drawH = size / ratio;
        } else {
            drawH = size;
            drawW = size * ratio;
        }
        ctx.drawImage(this.img, -drawW/2, -drawH/2, drawW, drawH);
        ctx.restore();
    }
}

/* Jar splash particles when fruit lands in jar */
class JarSplashParticle {
    constructor(x, y) {
        this.x = x;
        this.y = y;
        this.vx = (Math.random() - 0.5) * 6;
        this.vy = (Math.random() - 0.5) * 5 - 3;
        this.life = 25;
        this.size = 4 + Math.random() * 7;
        this.color = `hsl(${40 + Math.random() * 30}, 90%, 65%)`;
    }
    update() {
        this.x += this.vx;
        this.y += this.vy;
        this.vy += 0.12;
        this.life--;
    }
    draw() {
        ctx.fillStyle = this.color;
        ctx.globalAlpha = this.life / 25;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size * 0.6, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
    }
}

/* particles (juice effect) */
class Particle{
    constructor(x,y){
        this.x = x;
        this.y = y;
        this.vx = (Math.random() - 0.5) * 9;
        this.vy = (Math.random() - 0.5) * 9 - 2.5;
        this.life = 30;
        this.size = 5 + Math.random() * 6;
    }
    update(){
        this.x += this.vx;
        this.y += this.vy;
        this.vy += 0.15;
        this.life--;
        if(this.x < 0) this.x = 0;
        if(this.x > screenWidth) this.x = screenWidth;
    }
    draw(){
        ctx.fillStyle = `rgba(255, 180, 50, ${this.life/25})`;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size*0.7, 0, Math.PI*2);
        ctx.fill();
    }
}

/* ⏱ SPAWN SYSTEM */
let startTime = Date.now();
let spawnInterval = null;

function startSpawning(){
    if(spawnInterval) clearInterval(spawnInterval);
    spawnInterval = setInterval(()=>{
        if(!running) return;
        let elapsed = (Date.now() - startTime) / 1000;
        let maxExtra = 1;
        if(elapsed > 60) maxExtra = 4;
        else if(elapsed > 35) maxExtra = 3;
        else if(elapsed > 15) maxExtra = 2;
        let fruitCountToSpawn = 1 + Math.floor(Math.random() * maxExtra);
        for(let i=0;i<fruitCountToSpawn;i++){
            setTimeout(()=>{
                if(running && fruits.length < 24) fruits.push(new Fruit());
            }, i * 130);
        }
    }, 1300);
}

/* 🎯 CUTTING MECHANICS */
let drawing = false;

function handleCut(x,y){
    if(!running) return;
    
    // Check special items first
    for(let i=0;i<specialItems.length;i++){
        let s = specialItems[i];
        let dx = s.x - x;
        let dy = s.y - y;
        let dist = Math.hypot(dx,dy);
        if(dist < s.radius + 18 && !s.sliced){
            s.sliced = true;
            showVeryGoodPopup();
            for(let p=0;p<25;p++) particles.push(new Particle(s.x, s.y));
            specialItems.splice(i,1);
            return;
        }
    }
    
    // Normal fruit cutting
    for(let i=0;i<fruits.length;i++){
        let f = fruits[i];
        let dx = f.x - x;
        let dy = f.y - y;
        let dist = Math.hypot(dx,dy);
        if(dist < f.radius + 18 && !f.sliced){
            f.sliced = true;
            score++;
            fruitCutCounter++;
            document.getElementById("score").innerText = score;
            
            trySpawnSpecialItem();
            
            let target = jarPositions[f.key];
            if(!target){
                updateJarPositions();
                target = jarPositions[f.key];
            }
            if(target){
                let leftSlice = new SlicePart(f.x, f.y, f.img, f.key, -1, target.x, target.y);
                let rightSlice = new SlicePart(f.x, f.y, f.img, f.key, 1, target.x, target.y);
                slices.push(leftSlice, rightSlice);
            } else {
                let leftSlice = new SlicePart(f.x, f.y, f.img, f.key, -1, screenWidth/2, screenHeight-80);
                let rightSlice = new SlicePart(f.x, f.y, f.img, f.key, 1, screenWidth/2, screenHeight-80);
                slices.push(leftSlice, rightSlice);
            }
            
            for(let p=0;p<22;p++) particles.push(new Particle(f.x, f.y));
            fruits.splice(i,1);
            break;
        }
    }
}

// touch + mouse events
canvas.addEventListener("mousedown",(e)=>{ 
    drawing=true; 
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    let canvasX = (e.clientX - rect.left) * scaleX;
    let canvasY = (e.clientY - rect.top) * scaleY;
    handleCut(canvasX, canvasY); 
});
window.addEventListener("mouseup",()=>{ drawing=false; });
canvas.addEventListener("mousemove",(e)=>{ 
    if(drawing){
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        let canvasX = (e.clientX - rect.left) * scaleX;
        let canvasY = (e.clientY - rect.top) * scaleY;
        handleCut(canvasX, canvasY);
    }
});

canvas.addEventListener("touchstart",(e)=>{
    e.preventDefault();
    drawing=true;
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    let tx = (e.touches[0].clientX - rect.left) * scaleX;
    let ty = (e.touches[0].clientY - rect.top) * scaleY;
    handleCut(tx, ty);
});
canvas.addEventListener("touchend",(e)=>{ e.preventDefault(); drawing=false; });
canvas.addEventListener("touchmove",(e)=>{
    e.preventDefault();
    if(!drawing) return;
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    let tx = (e.touches[0].clientX - rect.left) * scaleX;
    let ty = (e.touches[0].clientY - rect.top) * scaleY;
    handleCut(tx, ty);
});

/* GAME OVER LOGIC */
function gameOver(){
    if(!running) return;
    running = false;
    if(spawnInterval) clearInterval(spawnInterval);
    cancelAnimationFrame(animationId);
    
    const summaryTable = document.getElementById("summaryTable");
    summaryTable.innerHTML = "";
    
    for(let fruit of fruitTypes){
        let count = jarFruitCount[fruit.key];
        let row = document.createElement("tr");
        row.innerHTML = `<td class="jarName">${fruit.name}</td><td class="jarCount"> 🧺 ${count}</td>`;
        summaryTable.appendChild(row);
    }
    
    let totalRow = document.createElement("tr");
    totalRow.style.borderTop = "2px solid gold";
    totalRow.innerHTML = `<td class="jarName">🔪 TOTAL CUT</td><td class="jarCount">⭐ ${score}</td>`;
    summaryTable.appendChild(totalRow);
    
    document.getElementById("gameOver").style.display = "block";
}

/* restart everything fresh */
function restartGame(){
    cancelAnimationFrame(animationId);
    if(spawnInterval) clearInterval(spawnInterval);
    
    fruits = [];
    slices = [];
    particles = [];
    specialItems = [];
    score = 0;
    fruitCutCounter = 0;
    running = true;
    
    jarFruitCount = {
        apple: 0,
        banana: 0,
        orange: 0,
        apricot: 0,
        pineapple: 0
    };
    
    for(let f of fruitTypes){
        updateJarBadge(f.key);
    }
    
    document.getElementById("score").innerText = "0";
    document.getElementById("gameOver").style.display = "none";
    
    startTime = Date.now();
    startSpawning();
    updateJarPositions();
    
    function drawLoop(){
        if(!running) return;
        ctx.clearRect(0,0,canvas.width,canvas.height);
        
        for(let i=0;i<fruits.length;i++){
            let f = fruits[i];
            f.update();
            f.draw();
            if(f.y > screenHeight - 100 && !f.sliced){
                gameOver();
                return;
            }
            if(f.sliced){
                fruits.splice(i,1);
                i--;
            }
        }
        
        for(let i=0;i<specialItems.length;i++){
            let s = specialItems[i];
            s.update();
            s.draw();
            if(s.y > screenHeight - 100 && !s.sliced){
                specialItems.splice(i,1);
                i--;
            }
        }
        
        for(let i=0;i<slices.length;i++){
            let s = slices[i];
            s.update();
            s.draw();
            if(s.alpha <= 0 || s.teleportTriggered){
                slices.splice(i,1);
                i--;
            }
        }
        
        for(let i=0;i<particles.length;i++){
            particles[i].update();
            particles[i].draw();
            if(particles[i].life <= 0){
                particles.splice(i,1);
                i--;
            }
        }
        
        animationId = requestAnimationFrame(drawLoop);
    }
    
    drawLoop();
}
