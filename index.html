<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fruit Cutting Game - Jar Counter (Big Fruits)</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">

<style>
body{
    margin:0;
    overflow:hidden;
    background: radial-gradient(circle at top, #0a0f1e, #000000);
    font-family: 'Segoe UI', 'Arial', sans-serif;
    color:white;
    touch-action: none;
}

canvas{
    display:block;
    position:absolute;
    top:0;
    left:0;
    z-index:1;
}

#ui{
    position:absolute;
    top:15px;
    left:20px;
    font-size:26px;
    font-weight:bold;
    background:rgba(0,0,0,0.6);
    padding:8px 20px;
    border-radius:40px;
    backdrop-filter:blur(5px);
    z-index:20;
    letter-spacing:1px;
    box-shadow:0 0 10px rgba(0,255,200,0.3);
    font-family:monospace;
}

#gameOver{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:rgba(0,0,0,0.9);
    backdrop-filter:blur(12px);
    padding:30px 35px;
    border-radius:60px;
    text-align:center;
    z-index:100;
    display:none;
    border:2px solid gold;
    box-shadow:0 0 50px rgba(255,215,0,0.5);
    min-width:280px;
}

#gameOver h1{
    font-size:48px;
    margin:0 0 15px 0;
    color:#ffcc44;
    text-shadow:2px 2px 0 #aa5500;
}

#summaryTable{
    margin:20px auto;
    background:#1e1a2f;
    border-radius:28px;
    padding:15px 20px;
    text-align:left;
    font-size:18px;
    font-weight:bold;
    border-spacing: 12px;
    width:100%;
}

#summaryTable td{
    padding:6px 12px;
    border-bottom:1px solid #ffcc66;
    font-size:20px;
}

#summaryTable tr:last-child td{
    border-bottom:none;
}

.jarName{
    color:#ffcc88;
    font-weight:bold;
}
.jarCount{
    color:#ffaa44;
    font-weight:bold;
    font-size:24px;
    text-align:right;
}

button{
    margin-top:20px;
    padding:12px 30px;
    font-size:20px;
    font-weight:bold;
    border:none;
    background:linear-gradient(45deg,#ff416c,#ff4b2b);
    color:white;
    cursor:pointer;
    border-radius:50px;
    transition:0.2s;
    box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

button:active{
    transform:scale(0.96);
}

/* JARS CONTAINER (MODERN GLASS) */
#boxes{
    position:absolute;
    bottom:12px;
    width:100%;
    display:flex;
    justify-content:space-evenly;
    align-items:flex-end;
    gap:8px;
    padding:0 6px;
    z-index:15;
    pointer-events:none;
    box-sizing:border-box;
}

.box{
    width:70px;
    height:96px;
    background:linear-gradient(145deg,#2c2418,#1a150e);
    border:2px solid #ffcc66;
    border-radius:18px 18px 35px 35px;
    text-align:center;
    position:relative;
    box-shadow:0 10px 12px rgba(0,0,0,0.4);
    transition: all 0.1s ease;
    backdrop-filter: blur(2px);
}

/* jar shine */
.box::before{
    content:"";
    position:absolute;
    top:-7px;
    left:20%;
    width:60%;
    height:10px;
    background:#eebb55;
    border-radius:20px;
    opacity:0.7;
}

.label{
    position:absolute;
    top:-26px;
    left:50%;
    transform:translateX(-50%);
    background:linear-gradient(135deg,#f5d742,#e6b800);
    color:#2c1a00;
    font-weight:bold;
    font-size:14px;
    padding:4px 10px;
    border-radius:40px;
    font-family: "Arial Black", Arial, sans-serif;
    white-space:nowrap;
    box-shadow:0 2px 8px gold;
    letter-spacing:1px;
}

/* counter badge on jar */
.jarCounterBadge{
    position:absolute;
    bottom:-12px;
    right:-10px;
    background:#ff4444;
    color:white;
    font-weight:bold;
    font-size:16px;
    min-width:28px;
    height:28px;
    border-radius:40px;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:0 8px;
    border:2px solid gold;
    font-family:monospace;
    font-weight:bold;
    background:#dd3311;
    box-shadow:0 2px 6px black;
    z-index:25;
    pointer-events:none;
}

.box img{
    width:52px;
    margin-top:22px;
    filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.5));
}

/* fruit display icons */
</style>
</head>

<body>

<div id="ui">🍉 SCORE: <span id="score">0</span></div>

<div id="gameOver">
    <h1>🍍 GAME OVER 🍎</h1>
    <div style="font-size:20px; margin-bottom:8px;">✨ Fruits Collected in Jars ✨</div>
    <table id="summaryTable">
        <!-- dynamic rows filled by JS -->
    </table>
    <button onclick="restartGame()">🔪 RESTART GAME 🔪</button>
</div>

<div id="boxes"></div>
<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

// high quality rendering
ctx.imageSmoothingEnabled = true;
ctx.imageSmoothingQuality = "high";

/* 💥 RESIZE FIX */
function resizeCanvas(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener("resize", ()=>{
    resizeCanvas();
    updateJarPositions(); // re-calc jar zones after resize
});

let fruits = [];
let slices = [];
let particles = [];
let score = 0;
let running = true;
let animationId;

/* ========== 🥫 JAR TRACKER SYSTEM ========== */
// each fruit type has its own counter
let jarFruitCount = {
    apple: 0,
    banana: 0,
    orange: 0,
    apricot: 0,
    pineapple: 0
};

// fruit types
const fruitTypes = [
    { key:"apple",    name:"🍎 Apple",   img:"https://i.postimg.cc/nLv9sKHn/pngtree-fresh-apple-fruit-red-png-image-10203073.png" },
    { key:"banana",   name:"🍌 Banana",  img:"https://i.postimg.cc/htQdnW6J/images-11-removebg-preview.png" },
    { key:"orange",   name:"🍊 Orange",  img:"https://i.postimg.cc/G2wPVhmj/orange-1218158-1280.png" },
    { key:"apricot",  name:"🍑 Apricot", img:"https://i.postimg.cc/WzsGpWrZ/pngimg-com-apricot-PNG12652.png" },
    { key:"pineapple",name:"🍍 Pineapple",img:"https://i.postimg.cc/XYqgyzPk/pngtree-pineapple-png-with-ai-generated-png-image-11568478.png" }
];

const boxesDiv = document.getElementById("boxes");
let jarPositions = {};   // stores { key: { x, y } } (center point for teleport)

// create jars dynamically
function buildJars(){
    boxesDiv.innerHTML = "";
    fruitTypes.forEach((fruit, idx) => {
        const box = document.createElement("div");
        box.className = "box";
        box.setAttribute("data-jar", fruit.key);
        
        const label = document.createElement("div");
        label.className = "label";
        label.innerText = "صوفی";
        box.appendChild(label);
        
        const fruitImg = document.createElement("img");
        fruitImg.src = fruit.img;
        fruitImg.alt = fruit.key;
        box.appendChild(fruitImg);
        
        // counter badge
        const badge = document.createElement("div");
        badge.className = "jarCounterBadge";
        badge.id = `badge_${fruit.key}`;
        badge.innerText = "0";
        box.appendChild(badge);
        
        boxesDiv.appendChild(box);
    });
    // update positions after DOM append
    setTimeout(() => {
        updateJarPositions();
    }, 40);
}

function updateJarPositions(){
    const boxes = document.querySelectorAll(".box");
    boxes.forEach((box, index) => {
        const rect = box.getBoundingClientRect();
        const fruitKey = fruitTypes[index].key;
        jarPositions[fruitKey] = {
            x: rect.left + rect.width/2,
            y: rect.top + rect.height/2 - 10   // middle of jar body for attraction
        };
    });
}

// update UI count on jar badge
function updateJarBadge(fruitKey){
    const badge = document.getElementById(`badge_${fruitKey}`);
    if(badge){
        badge.innerText = jarFruitCount[fruitKey];
        // little pop animation
        badge.style.transform = "scale(1.2)";
        setTimeout(()=>{ if(badge) badge.style.transform = "scale(1)"; }, 150);
    }
}

// increment counter when slice teleports into jar
function incrementJarCounter(fruitKey){
    if(jarFruitCount.hasOwnProperty(fruitKey)){
        jarFruitCount[fruitKey]++;
        updateJarBadge(fruitKey);
    }
}

/* 🍉 FRUIT CLASS - BIG SIZE INCREASED */
class Fruit{
    constructor(){
        this.data = fruitTypes[Math.floor(Math.random()*fruitTypes.length)];
        this.key = this.data.key;
        this.img = new Image();
        this.img.src = this.data.img;
        this.x = Math.random() * canvas.width;
        this.y = -60 - Math.random() * 40;
        // 👇 BIGGER FRUIT RADIUS (increased from 58 to 78)
        this.radius = 78;
        this.speedY = 1.8 + Math.random() * 2.5;
        this.gravity = 0.25;
        this.sliced = false;
        this.rotation = 0;
    }

    update(){
        this.speedY += this.gravity;
        this.y += this.speedY;
        this.rotation += 0.03;
    }

    draw(){
        if(!this.img.complete){
            ctx.fillStyle="#ffaa55";
            ctx.beginPath();
            ctx.arc(this.x,this.y,55,0,Math.PI*2);
            ctx.fill();
            ctx.fillStyle="black";
            ctx.font="bold 24px sans-serif";
            ctx.fillText("?",this.x-12,this.y+10);
            return;
        }

        // 👇 BIGGER FRUIT DRAW SIZE (increased from 112 to 160)
        let size = 160;
        let ratio = this.img.width / this.img.height;
        let drawW, drawH;
        if(ratio > 1){
            drawW = size;
            drawH = size / ratio;
        }else{
            drawH = size;
            drawW = size * ratio;
        }
        
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.rotation);
        ctx.drawImage(this.img, -drawW/2, -drawH/2, drawW, drawH);
        ctx.restore();
    }
}

/* 🍉 SLICE PART - TELEPORT TO OWN JAR (BIGGER SLICES) */
class SlicePart{
    constructor(x, y, img, fruitKey, side, targetX, targetY){
        this.x = x;
        this.y = y;
        this.img = img;
        this.fruitKey = fruitKey;
        this.side = side;
        this.vx = side * (4.2 + Math.random() * 1.5);
        this.vy = -5.2 - Math.random() * 2;
        this.targetX = targetX;
        this.targetY = targetY;
        this.gravity = 0.2;
        this.rot = 0;
        this.alpha = 1;
        this.toJar = false;
        this.teleportTriggered = false;
    }

    update(){
        if(!this.toJar){
            this.x += this.vx;
            this.y += this.vy;
            this.vy += this.gravity;
            this.rot += 0.15;
            if(this.vy > 1.5 || this.y > canvas.height - 120){
                this.toJar = true;
            }
        } else {
            let dx = this.targetX - this.x;
            let dy = this.targetY - this.y;
            let distance = Math.hypot(dx, dy);
            if(distance < 8 && !this.teleportTriggered){
                incrementJarCounter(this.fruitKey);
                this.teleportTriggered = true;
                this.alpha = 0;
                return;
            }
            let speed = 0.18;
            this.x += dx * speed;
            this.y += dy * speed;
            this.rot += 0.1;
            if(distance < 15 && !this.teleportTriggered){
                incrementJarCounter(this.fruitKey);
                this.teleportTriggered = true;
                this.alpha = 0;
            }
        }

        if(this.alpha <= 0) return;
        if(this.y > canvas.height + 150 || this.x < -150 || this.x > canvas.width + 150){
            this.alpha = 0;
        }
    }

    draw(){
        if(this.alpha <= 0) return;
        if(!this.img.complete) return;
        
        ctx.save();
        ctx.globalAlpha = Math.min(this.alpha, 0.95);
        ctx.translate(this.x, this.y);
        ctx.rotate(this.rot);
        
        // 👇 BIGGER CLIPPING FOR HALVES
        let w = 130;
        ctx.beginPath();
        if(this.side === -1){
            ctx.rect(-w/2, -w/2, w/2, w);
        } else {
            ctx.rect(0, -w/2, w/2, w);
        }
        ctx.clip();
        
        // 👇 BIGGER SLICE DRAW SIZE
        let size = 140;
        let ratio = this.img.width / this.img.height;
        let drawW, drawH;
        if(ratio > 1){
            drawW = size;
            drawH = size / ratio;
        } else {
            drawH = size;
            drawW = size * ratio;
        }
        ctx.drawImage(this.img, -drawW/2, -drawH/2, drawW, drawH);
        ctx.restore();
    }
}

/* particles (juice effect) - slightly bigger splash */
class Particle{
    constructor(x,y){
        this.x = x;
        this.y = y;
        this.vx = (Math.random() - 0.5) * 9;
        this.vy = (Math.random() - 0.5) * 9 - 2.5;
        this.life = 30;
        this.size = 5 + Math.random() * 6;
    }
    update(){
        this.x += this.vx;
        this.y += this.vy;
        this.vy += 0.15;
        this.life--;
    }
    draw(){
        ctx.fillStyle = `rgba(255, 180, 50, ${this.life/25})`;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size*0.7, 0, Math.PI*2);
        ctx.fill();
    }
}

/* ⏱ SPAWN SYSTEM - progressive difficulty */
let startTime = Date.now();
let spawnInterval = null;

function startSpawning(){
    if(spawnInterval) clearInterval(spawnInterval);
    spawnInterval = setInterval(()=>{
        if(!running) return;
        let elapsed = (Date.now() - startTime) / 1000;
        let maxExtra = 1;
        if(elapsed > 60) maxExtra = 4;
        else if(elapsed > 35) maxExtra = 3;
        else if(elapsed > 15) maxExtra = 2;
        let fruitCountToSpawn = 1 + Math.floor(Math.random() * maxExtra);
        for(let i=0;i<fruitCountToSpawn;i++){
            setTimeout(()=>{
                if(running && fruits.length < 24) fruits.push(new Fruit());
            }, i * 130);
        }
    }, 1300);
}

/* 🎯 CUTTING MECHANICS (swipe & mouse) - adjusted for bigger hit radius */
let drawing = false;

function handleCut(x,y){
    if(!running) return;
    for(let i=0;i<fruits.length;i++){
        let f = fruits[i];
        let dx = f.x - x;
        let dy = f.y - y;
        let dist = Math.hypot(dx,dy);
        // 👇 BIGGER SLICE RADIUS (increased from 70 to 95)
        if(dist < f.radius + 18 && !f.sliced){
            f.sliced = true;
            score++;
            document.getElementById("score").innerText = score;
            
            let target = jarPositions[f.key];
            if(!target){
                updateJarPositions();
                target = jarPositions[f.key];
            }
            if(target){
                let leftSlice = new SlicePart(f.x, f.y, f.img, f.key, -1, target.x, target.y);
                let rightSlice = new SlicePart(f.x, f.y, f.img, f.key, 1, target.x, target.y);
                slices.push(leftSlice, rightSlice);
            } else {
                let leftSlice = new SlicePart(f.x, f.y, f.img, f.key, -1, canvas.width/2, canvas.height-80);
                let rightSlice = new SlicePart(f.x, f.y, f.img, f.key, 1, canvas.width/2, canvas.height-80);
                slices.push(leftSlice, rightSlice);
            }
            
            for(let p=0;p<22;p++) particles.push(new Particle(f.x, f.y));
            fruits.splice(i,1);
            break;
        }
    }
}

// touch + mouse events
canvas.addEventListener("mousedown",(e)=>{ drawing=true; handleCut(e.clientX, e.clientY); });
window.addEventListener("mouseup",()=>{ drawing=false; });
canvas.addEventListener("mousemove",(e)=>{ if(drawing) handleCut(e.clientX, e.clientY); });

canvas.addEventListener("touchstart",(e)=>{
    e.preventDefault();
    drawing=true;
    const rect = canvas.getBoundingClientRect();
    let tx = e.touches[0].clientX - rect.left;
    let ty = e.touches[0].clientY - rect.top;
    handleCut(tx, ty);
});
canvas.addEventListener("touchend",(e)=>{ e.preventDefault(); drawing=false; });
canvas.addEventListener("touchmove",(e)=>{
    e.preventDefault();
    if(!drawing) return;
    const rect = canvas.getBoundingClientRect();
    let tx = e.touches[0].clientX - rect.left;
    let ty = e.touches[0].clientY - rect.top;
    handleCut(tx, ty);
});

/* GAME OVER LOGIC + SHOW SUMMARY (BIG FONT MID SCREEN) */
function gameOver(){
    if(!running) return;
    running = false;
    if(spawnInterval) clearInterval(spawnInterval);
    cancelAnimationFrame(animationId);
    
    const summaryTable = document.getElementById("summaryTable");
    summaryTable.innerHTML = "";
    
    for(let fruit of fruitTypes){
        let count = jarFruitCount[fruit.key];
        let row = document.createElement("tr");
        row.innerHTML = `<td class="jarName">${fruit.name}</td><td class="jarCount"> 🧺 ${count}</td>`;
        summaryTable.appendChild(row);
    }
    
    let totalRow = document.createElement("tr");
    totalRow.style.borderTop = "2px solid gold";
    totalRow.innerHTML = `<td class="jarName">🔪 TOTAL CUT</td><td class="jarCount">⭐ ${score}</td>`;
    summaryTable.appendChild(totalRow);
    
    document.getElementById("gameOver").style.display = "block";
}

/* restart everything fresh */
function restartGame(){
    cancelAnimationFrame(animationId);
    if(spawnInterval) clearInterval(spawnInterval);
    
    fruits = [];
    slices = [];
    particles = [];
    score = 0;
    running = true;
    
    jarFruitCount = {
        apple: 0,
        banana: 0,
        orange: 0,
        apricot: 0,
        pineapple: 0
    };
    
    for(let f of fruitTypes){
        updateJarBadge(f.key);
    }
    
    document.getElementById("score").innerText = "0";
    document.getElementById("gameOver").style.display = "none";
    
    startTime = Date.now();
    startSpawning();
    updateJarPositions();
    
    function drawLoop(){
        if(!running) return;
        ctx.clearRect(0,0,canvas.width,canvas.height);
        
        for(let i=0;i<fruits.length;i++){
            let f = fruits[i];
            f.update();
            f.draw();
            if(f.y > canvas.height + 100 && !f.sliced){
                gameOver();
                return;
            }
            if(f.sliced){
                fruits.splice(i,1);
                i--;
            }
        }
        
        for(let i=0;i<slices.length;i++){
            let s = slices[i];
            s.update();
            s.draw();
            if(s.alpha <= 0 || s.teleportTriggered){
                slices.splice(i,1);
                i--;
            }
        }
        
        for(let i=0;i<particles.length;i++){
            particles[i].update();
            particles[i].draw();
            if(particles[i].life <= 0){
                particles.splice(i,1);
                i--;
            }
        }
        
        animationId = requestAnimationFrame(drawLoop);
    }
    
    drawLoop();
}

/* 🧹 UTILITY: initial build and update positions */
buildJars();
updateJarPositions();
window.addEventListener('resize', ()=>{
    setTimeout(()=>{
        updateJarPositions();
    }, 60);
});

startSpawning();

// MAIN ANIMATION INIT
function mainLoop(){
    if(!running) return;
    ctx.clearRect(0,0,canvas.width,canvas.height);
    
    for(let i=0;i<fruits.length;i++){
        let f = fruits[i];
        f.update();
        f.draw();
        if(f.y > canvas.height + 90 && !f.sliced){
            gameOver();
            return;
        }
        if(f.sliced){
            fruits.splice(i,1);
            i--;
        }
    }
    
    for(let i=0;i<slices.length;i++){
        let s = slices[i];
        s.update();
        s.draw();
        if(s.alpha <= 0 || s.teleportTriggered){
            slices.splice(i,1);
            i--;
        }
    }
    
    for(let i=0;i<particles.length;i++){
        particles[i].update();
        particles[i].draw();
        if(particles[i].life <= 0){
            particles.splice(i,1);
            i--;
        }
    }
    
    animationId = requestAnimationFrame(mainLoop);
}

mainLoop();

setInterval(()=>{
    if(running){
        updateJarPositions();
    }
}, 2200);
</script>

</body>
</html>
